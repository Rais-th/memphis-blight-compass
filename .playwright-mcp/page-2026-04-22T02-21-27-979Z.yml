      - heading "Memphis Blight Compass" [level=1] [ref=e12]
      - paragraph [ref=e13]: The 311 integration has not yet been solved. Complaints, code enforcement cases, and Land Bank inventory live in separate systems. This tool joins them, scores parcels by chronic complaint density, and surfaces acquisition-ready lots where the City already owns the inventory.

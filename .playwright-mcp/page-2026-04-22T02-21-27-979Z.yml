      - heading "Why this exists" [level=2] [ref=e33]
      - paragraph [ref=e34]: "The Bloomberg Harvard City Leadership Initiative publicly documented in October 2023 that Memphis's 311 integration \"has not yet been solved\" — complaints don't route effectively between Code Enforcement, Public Works, and Solid Waste. Director Melanie Neal of Community Enhancement said in October 2025: \"We need a faster way to intervene.\""
      - paragraph [ref=e35]: Meanwhile, Shelby County Land Bank inventory isn't cross-referenced with 311 blight data. Parcels sell for $400 to $2,000 in zones where neighbors have complained for years. Nothing connects the data — until now.
    - generic [ref=e36]:
      - heading "How to use this" [level=2] [ref=e37]
      - heading "Blight strike team" [level=3] [ref=e38]
      - paragraph [ref=e39]:
        - text: Open
        - link "the map" [ref=e40] [cursor=pointer]:
          - /url: /map
        - text: and sort by score. Each red dot is a parcel with 3+ complaints in 12 months or multiple active code cases. The
        - link "equity dashboard" [ref=e41] [cursor=pointer]:
          - /url: /equity
        - text: shows which zips wait longest for resolution.
      - heading "Residents and non-profits" [level=3] [ref=e42]
      - paragraph [ref=e43]:
        - text: The
        - link "top 50" [ref=e44] [cursor=pointer]:

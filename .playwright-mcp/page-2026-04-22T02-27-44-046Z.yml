    - heading "Scoring formula" [level=2] [ref=e46]
    - generic [ref=e47]: score = (chronic_complaints × 3) chronic = 3+ 311 requests in last 12 months + (code_violations × 2) count of Code Enforcement cases + (1 if flood_zone is X) FEMA Zone X or SFHA=False + (1 if asking_price < $2000) + (1 if width ≥ 30 AND length ≥ 50)
    - paragraph [ref=e48]: Higher scores = more neighborhood pain concentrated on a single parcel, with attributes that make intervention practical. This ranks parcels, it does not judge owners. Scores are recomputed each ingestion run.
    - heading "What this tool does not do" [level=2] [ref=e49]
    - list [ref=e50]:
      - listitem [ref=e51]: Does not accept applications or transfer ownership.
      - listitem [ref=e52]: Does not publish owner-level editorial claims. Owner fields are hidden; apply via the Land Bank portal for official records.
      - listitem [ref=e53]: Does not include eviction, tenant, or non-public court data.
      - listitem [ref=e54]: Does not constitute legal, financial, or real-estate advice.

    - heading "About the Blight Compass" [level=1] [ref=e11]
    - paragraph [ref=e12]: A single public interface for the datasets Memphis already publishes but rarely joins. Built for the Blight Strike Team, resident advocates, journalists, and anyone who has tried to report the same abandoned lot three times and wondered where the request went.

app = "memphis-blight-compass"
primary_region = "ord"

[build]

[env]
  PORT = "8000"
  COMPASS_DB_PATH = "/data/compass.db"

[[mounts]]
  source = "compass_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 80
    hard_limit = 200

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[[statics]]
  guest_path = "/app/web"
  url_prefix = "/static"

[processes]
  app = "python -m uvicorn api.main:app --host 0.0.0.0 --port 8000"

[deploy]
  release_command = "python -m db"
